<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>&#20808;&#29983;&#12408; &#8212; Thank You, Sensei</title>
  <meta name="description" content="A heartfelt farewell gift for our Japanese sensei, from all students with love.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20260630205534">

  <!-- SVG Cartoon Filter for paintings -->
  <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
    <defs>
      <filter id="cartoon-filter" color-interpolation-filters="sRGB">
        <feColorMatrix type="saturate" values="2.5"/>
        <feComponentTransfer>
          <feFuncR type="discrete" tableValues="0 0.2 0.4 0.65 0.85 1"/>
          <feFuncG type="discrete" tableValues="0 0.2 0.4 0.65 0.85 1"/>
          <feFuncB type="discrete" tableValues="0 0.2 0.4 0.65 0.85 1"/>
        </feComponentTransfer>
        <feConvolveMatrix order="3" kernelMatrix="0 -0.5 0 -0.5 3 -0.5 0 -0.5 0"/>
      </filter>
    </defs>
  </svg>
</head>
<body>

  <!-- Language Toggle -->
  <div id="lang-toggle" class="lang-toggle">
    <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
    <span class="lang-sep">|</span>
    <button class="lang-btn" id="btn-jp" onclick="setLang('jp')">JP</button>
  </div>

  <!-- Mute Toggle -->
  <div class="mute-toggle">
    <button class="mute-btn" id="mute-btn" onclick="toggleMute()" title="Mute music" aria-label="Mute background music">&#x1F50A;</button>
  </div>

  <!-- Progress -->
  <div id="progress-bar" class="progress-bar hidden">
    <div class="petals">
      <span class="pt" data-msg="1">&#x1F338;</span>
      <span class="pt" data-msg="2">&#x1F338;</span>
      <span class="pt" data-msg="3">&#x1F338;</span>
      <span class="pt" data-msg="4">&#x1F338;</span>
      <span class="pt" data-msg="5">&#x1F338;</span>
      <span class="pt" data-msg="6">&#x1F338;</span>
    </div>
    <span class="pt-count" id="pt-count">0/6</span>
  </div>


  <!-- ========================
       SCENE 1 - DOOR
  ========================= -->
  <section id="scene-door" class="scene active">
    <div class="door-sky"></div>
    <div class="door-glow-bg"></div>
    <div id="stars-wrap"></div>
    <div class="moon"><div class="moon-face"></div></div>
    <div id="sakura-wrap"></div>

    <!-- Lantern -->
    <div class="lantern" aria-hidden="true">
      <div class="lan-rope"></div>
      <div class="lan-cap"></div>
      <div class="lan-body">
        <div class="lan-core"></div>
        <div class="lan-rib"></div><div class="lan-rib"></div>
        <div class="lan-rib"></div><div class="lan-rib"></div>
      </div>
      <div class="lan-fringe">
        <i></i><i></i><i></i><i></i><i></i>
      </div>
      <div class="lan-halo"></div>
    </div>

    <div class="door-stage">
      <div class="door-title-wrap">
        <h1 class="door-title" id="door-title" data-i18n="doorTitle"></h1>
        <p class="door-subtitle" id="door-subtitle" data-i18n="doorSubtitle"></p>
      </div>
      <p class="door-label" data-i18n="doorCaption"></p>
      <div class="door-outer">
        <div class="door-bar dtop"></div>
        <div class="door-bar dleft"></div>
        <div class="door-bar dright"></div>
        <div class="fusuma" id="fusuma"
             onclick="openDoor()" role="button" tabindex="0"
             aria-label="Open the door">
          <div class="warm-ray"></div>
          <div class="panel pleft" id="pleft">
            <div class="panel-tex"></div>
            <div class="panel-grid" aria-hidden="true">
              <div class="g-row"><s></s><s></s><s></s><s></s></div>
              <div class="g-row"><s></s><s></s><s></s><s></s></div>
              <div class="g-row"><s></s><s></s><s></s><s></s></div>
              <div class="g-cols"><b></b><b></b><b></b></div>
            </div>
            <span class="panel-kanji" aria-hidden="true">&#x5148;</span>
            <div class="panel-knob pk-l"></div>
          </div>
          <div class="panel pright" id="pright">
            <div class="panel-tex"></div>
            <div class="panel-grid" aria-hidden="true">
              <div class="g-row"><s></s><s></s><s></s><s></s></div>
              <div class="g-row"><s></s><s></s><s></s><s></s></div>
              <div class="g-row"><s></s><s></s><s></s><s></s></div>
              <div class="g-cols"><b></b><b></b><b></b></div>
            </div>
            <span class="panel-kanji" aria-hidden="true">&#x751F;&#x3078;</span>
            <div class="panel-knob pk-r"></div>
          </div>
          <div class="door-pulse-ring" aria-hidden="true"></div>
        </div>
        <div class="door-step"></div>
      </div>
    </div>
  </section>


  <!-- ========================
       SCENE 2 - ROOM
  ========================= -->
  <section id="scene-room" class="scene">
    <div class="room">

      <!-- Ceiling -->
      <div class="rm-ceil">
        <div class="ceil-beam"></div>
        <div class="ceil-beam"></div>
        <div class="ceil-beam"></div>
        <div class="ceil-lamp">&#x1F3EE;</div>
      </div>

      <!-- Wall -->
      <div class="rm-wall">
        <div class="wall-light l1"></div>
        <div class="wall-light l2"></div>

        <!-- Shoji left (desktop only) -->
        <div class="shoji shoji-l desktop-only" aria-hidden="true">
          <div class="shoji-paper">
            <div class="sp-h"></div><div class="sp-h"></div>
            <div class="sp-h"></div><div class="sp-h"></div>
            <div class="sp-v"></div><div class="sp-v"></div>
          </div>
          <div class="shoji-shine"></div>
        </div>

        <!-- Painting 1 -->
        <button class="painting" id="painting-1" onclick="openPainting(1)"
                aria-label="Open class memory 1">
          <div class="frame-wood">
            <div class="frame-mat">
              <img src="references/cartoon_image_1.jpeg" alt="Class memory" class="p-photo">
            </div>
          </div>
          <span class="p-nameplate" data-i18n="painting1Label"></span>
          <span class="p-tap-hint">&#x1F5BC; Tap</span>
        </button>

        <!-- Kakemono + Final Box -->
        <div class="wall-center">
          <div class="kakemono" aria-hidden="true">
            <div class="kk-top"></div>
            <div class="kk-scroll">
              <span>&#20808;</span><span>&#29983;</span><span>&#12408;</span>
            </div>
            <div class="kk-bot"></div>
          </div>
          <div class="final-mount">
            <button class="final-box" id="final-box" onclick="clickFinalBox()"
                    aria-label="Special gift box">
              <div class="fb-lid"><div class="fb-lid-gem"></div></div>
              <div class="fb-body">
                <span class="fb-star">&#x2756;</span>
              </div>
              <div class="fb-lock-icon" id="fb-lock">&#x1F512;</div>
              <div class="fb-shine"></div>
            </button>
            <span class="final-lbl" data-i18n="finalBoxLabel"></span>
          </div>
        </div>

        <!-- Painting 2 -->
        <button class="painting" id="painting-2" onclick="openPainting(2)"
                aria-label="Open class memory 2">
          <div class="frame-wood">
            <div class="frame-mat">
              <img src="references/cartoon_image_2.jpeg" alt="Class memory" class="p-photo">
            </div>
          </div>
          <span class="p-nameplate" data-i18n="painting2Label"></span>
          <span class="p-tap-hint">&#x1F5BC; Tap</span>
        </button>

        <!-- Shoji right (desktop only) -->
        <div class="shoji shoji-r desktop-only" aria-hidden="true">
          <div class="shoji-paper">
            <div class="sp-h"></div><div class="sp-h"></div>
            <div class="sp-h"></div><div class="sp-h"></div>
            <div class="sp-v"></div><div class="sp-v"></div>
          </div>
          <div class="shoji-shine"></div>
        </div>
      </div><!-- .rm-wall -->

      <div class="baseboard"></div>

      <!-- Floor -->
      <div class="rm-floor">
        <div class="floor-ambient"></div>

        <!-- LEFT OBJECTS -->
        <button class="obj" id="obj-2" onclick="clickObject(2)"
                style="left:4%;top:5%">
          <div class="obj-vis">
            <div class="letter-wrap">
              <div class="ltr-body">
                <div class="ltr-flap"></div>
                <span class="ltr-icon">&#x2709;</span>
              </div>
            </div>
          </div>
          <span class="obj-label" data-i18n="obj2Label"></span>
        </button>

        <button class="obj" id="obj-3" onclick="clickObject(3)"
                style="left:10%;top:62%">
          <div class="obj-vis">
            <div class="books">
              <div class="book" style="--bc:#8b1a1a;height:46px;width:15px"></div>
              <div class="book" style="--bc:#1a3870;height:38px;width:13px"></div>
              <div class="book" style="--bc:#5c3317;height:30px;width:11px"></div>
            </div>
          </div>
          <span class="obj-label" data-i18n="obj3Label"></span>
        </button>

        <!-- RIGHT OBJECTS -->
        <button class="obj" id="obj-5" onclick="clickObject(5)"
                style="right:4%;top:5%">
          <div class="obj-vis">
            <div class="goban">
              <div class="goban-lines"></div>
              <div class="go-stone stone-w"></div>
              <div class="go-stone stone-b"></div>
            </div>
          </div>
          <span class="obj-label" data-i18n="obj5Label"></span>
        </button>

        <button class="obj" id="obj-6" onclick="clickObject(6)"
                style="right:8%;top:33%">
          <div class="obj-vis">
            <div class="bonsai-group">
              <span class="bonsai-leaf">&#x1F33F;</span>
              <div class="bonsai-pot"></div>
              <div class="bonsai-shelf"></div>
            </div>
          </div>
          <span class="obj-label" data-i18n="obj6Label"></span>
        </button>

        <button class="obj" id="obj-4" onclick="clickObject(4)"
                style="right:3%;top:66%">
          <div class="obj-vis">
            <div class="zabuton">
              <div class="zabuton-trim"></div>
              <div class="zabuton-gem"></div>
            </div>
          </div>
          <span class="obj-label" data-i18n="obj4Label"></span>
        </button>

        <!-- TABLE + BOX (center) -->
        <div class="table-wrap">
          <div class="jp-table">
            <div class="table-surface">
              <!-- OBJ 1: BIG clickable zone over table -->
              <button class="obj obj-box" id="obj-1" onclick="clickObject(1)"
                      aria-label="Open the wooden box">
                <div class="obj-vis">
                  <div class="wbox">
                    <div class="wbox-lid">
                      <div class="wbox-lid-line"></div>
                    </div>
                    <div class="wbox-body">
                      <div class="wbox-clasp"></div>
                    </div>
                  </div>
                </div>
                <span class="obj-label" data-i18n="obj1Label"></span>
              </button>
              <span class="table-tea">&#x1F375;</span>
            </div>
            <div class="table-legs"></div>
          </div>
        </div>

        <div class="floor-cushion" aria-hidden="true"></div>
      </div><!-- .rm-floor -->

      <!-- Sensei -->
      <div id="sensei" class="sensei">
        <div id="s-bubble" class="s-bubble hidden">
          <p id="s-text"></p>
          <div class="bubble-arrow"></div>
        </div>
        <div class="sensei-img-wrap">
          <img id="sensei-img" src="sensei.png" alt="Sensei"
               onerror="this.style.display='none';document.getElementById('sensei-fb').style.display='block'">
          <div id="sensei-fb" style="display:none;font-size:clamp(50px,12vw,70px)">&#x1F468;&#x200D;&#x1F3EB;</div>
        </div>
        <div class="sensei-shadow"></div>
      </div>

    </div><!-- .room -->

    <div id="free-bar" class="free-bar hidden">
      <button class="replay-btn" onclick="replayTour()" data-i18n="replayBtn"></button>
    </div>
  </section>


  <!-- MESSAGE MODAL -->
  <div id="msg-modal" class="modal-bg hidden"
       onclick="closeBg(event,'msg-modal')"
       role="dialog" aria-modal="true">
    <div class="msg-card" onclick="event.stopPropagation()">
      <button class="x-btn" onclick="closeModal('msg-modal')">&#x2715;</button>
      <div class="stamp" id="msg-stamp"></div>
      <h2 class="msg-title" id="msg-title"></h2>
      <div class="hr-line"></div>
      <p class="msg-body" id="msg-body"></p>
      <div class="card-deco">&#x2756; &ensp; &#20808;&#29983; &ensp; &#x2756;</div>
    </div>
  </div>

  <!-- FINAL MODAL -->
  <div id="final-modal" class="modal-bg final-bg hidden"
       onclick="closeBg(event,'final-modal')"
       role="dialog" aria-modal="true">
    <div class="final-card" onclick="event.stopPropagation()">
      <button class="x-btn x-gold" onclick="closeModal('final-modal')">&#x2715;</button>
      <div id="confetti-zone" aria-hidden="true"></div>
      <div class="final-hd">
        <span>&#x26E9;&#xFE0F;</span>
        <h2 class="final-title" id="final-title"></h2>
        <span>&#x1F338;</span>
      </div>
      <div class="hr-line gold-hr"></div>
      <div class="final-body" id="final-body"></div>
      <div class="final-sig" id="final-sig"></div>
      <div class="card-deco gold-deco">
        &#x2756; &ensp; &#20808;&#29983;&#12354;&#12426;&#12364;&#12392;&#12358;&#12372;&#12374;&#12356;&#12414;&#12377; &ensp; &#x2756;
      </div>
    </div>
  </div>

  <!-- PAINTING OVERLAY (before/after slider) -->
  <div id="painting-ov" class="painting-ov hidden"
       onclick="closePaintingOnBg(event)"
       role="dialog" aria-modal="true">
    <button class="ov-x" onclick="closePainting()">&#x2715;</button>
    <p class="ov-hint">&#8592; Drag to compare &#8594;</p>
    <div class="ba-wrap" id="ba-wrap">
      <!-- LEFT: cartoon filter -->
      <div class="ba-side ba-cartoon" id="ba-left">
        <img id="ba-art" src="" alt="Cartoon version" class="ba-img">
        <span class="ba-lbl cartoon-lbl" data-i18n="sliderLeft"></span>
      </div>
      <!-- RIGHT: original -->
      <div class="ba-side ba-original" id="ba-right">
        <img id="ba-orig" src="" alt="Original photo" class="ba-img">
        <span class="ba-lbl orig-lbl" data-i18n="sliderRight"></span>
      </div>
      <!-- Slider -->
      <div class="ba-line" id="ba-line" style="left:50%">
        <div class="ba-handle" id="ba-handle">&#x25C4;&#x25BA;</div>
      </div>
    </div>
  </div>

  <script src="app.js?v=20260630205534"></script>
</body>
</html>
