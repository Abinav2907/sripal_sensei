<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>先生へ — Thank You, Sensei 🌸</title>
  <meta name="description" content="A heartfelt interactive farewell gift for our Japanese language teacher, from all students with love.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── LANGUAGE TOGGLE ── -->
  <div id="lang-toggle" class="lang-toggle">
    <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
    <span class="lang-div">|</span>
    <button class="lang-btn" id="btn-jp" onclick="setLang('jp')">JP</button>
  </div>

  <!-- ── PROGRESS ── -->
  <div id="progress-bar" class="progress-bar hidden">
    <div class="petal-row" id="petal-row">
      <span class="petal" data-msg="1">🌸</span>
      <span class="petal" data-msg="2">🌸</span>
      <span class="petal" data-msg="3">🌸</span>
      <span class="petal" data-msg="4">🌸</span>
      <span class="petal" data-msg="5">🌸</span>
      <span class="petal" data-msg="6">🌸</span>
    </div>
    <span class="petal-count" id="petal-count">0/6</span>
  </div>


  <!-- ════════════════════════════
       SCENE 1 — DOOR
  ════════════════════════════ -->
  <section id="scene-door" class="scene active">
    <div class="sky-bg"></div>
    <div class="sky-glow"></div>
    <div id="stars-wrap" class="stars-wrap"></div>
    <div class="moon"><div class="moon-inner"></div></div>

    <!-- Sakura -->
    <div id="sakura-wrap" class="sakura-wrap"></div>

    <!-- Lantern -->
    <div class="lantern-wrap" aria-hidden="true">
      <div class="l-rope"></div>
      <div class="l-cap"></div>
      <div class="l-body">
        <div class="l-glow"></div>
        <div class="l-rib"></div><div class="l-rib"></div>
        <div class="l-rib"></div><div class="l-rib"></div>
      </div>
      <div class="l-fringe"><i></i><i></i><i></i><i></i><i></i></div>
      <div class="l-halo"></div>
    </div>

    <!-- Door -->
    <div class="door-stage">
      <p class="door-caption" data-i18n="doorCaption"></p>
      <div class="door-frame">
        <div class="frame-bar frame-top"></div>
        <div class="frame-bar frame-left"></div>
        <div class="frame-bar frame-right"></div>
        <div class="fusuma-wrap" id="fusuma-wrap"
             onclick="openDoor()" role="button" tabindex="0"
             aria-label="Open the door">
          <div class="warm-light"></div>
          <div class="panel panel-l" id="door-left">
            <div class="p-texture"></div>
            <div class="p-lattice" aria-hidden="true">
              <div class="lat-row"><s></s><s></s><s></s><s></s></div>
              <div class="lat-row"><s></s><s></s><s></s><s></s></div>
              <div class="lat-row"><s></s><s></s><s></s><s></s></div>
              <div class="lat-cols"><b></b><b></b><b></b></div>
            </div>
            <span class="p-kanji" aria-hidden="true">和</span>
            <div class="p-handle ph-l"></div>
          </div>
          <div class="panel panel-r" id="door-right">
            <div class="p-texture"></div>
            <div class="p-lattice" aria-hidden="true">
              <div class="lat-row"><s></s><s></s><s></s><s></s></div>
              <div class="lat-row"><s></s><s></s><s></s><s></s></div>
              <div class="lat-row"><s></s><s></s><s></s><s></s></div>
              <div class="lat-cols"><b></b><b></b><b></b></div>
            </div>
            <span class="p-kanji" aria-hidden="true">風</span>
            <div class="p-handle ph-r"></div>
          </div>
          <div class="door-glow-ring" aria-hidden="true"></div>
        </div>
        <div class="door-sill"></div>
      </div>
    </div>
  </section>


  <!-- ════════════════════════════
       SCENE 2 — ROOM
  ════════════════════════════ -->
  <section id="scene-room" class="scene">
    <div class="room">

      <!-- Ceiling -->
      <div class="rm-ceil" aria-hidden="true">
        <div class="ceil-beam"></div>
        <div class="ceil-beam"></div>
        <div class="ceil-beam"></div>
        <div class="ceil-lantern">🏮</div>
      </div>

      <!-- Back wall -->
      <div class="rm-wall">

        <!-- Ambient wall rays (sunlight from shoji) -->
        <div class="wall-ray ray1" aria-hidden="true"></div>
        <div class="wall-ray ray2" aria-hidden="true"></div>

        <!-- Left shoji -->
        <div class="shoji shoji-l" aria-hidden="true">
          <div class="shoji-inner">
            <div class="sh"></div><div class="sh"></div>
            <div class="sh"></div><div class="sh"></div>
            <div class="sv"></div><div class="sv"></div><div class="sv"></div>
          </div>
          <div class="shoji-glow"></div>
        </div>

        <!-- Painting 1 (clickable) -->
        <button class="painting" id="painting-1" onclick="openPainting(1)" aria-label="View class photo 1">
          <div class="frame-wood">
            <div class="frame-mat">
              <img src="references/painting_1.jpeg" alt="Class memory 1" class="p-img">
              <div class="p-varnish"></div>
            </div>
          </div>
          <div class="frame-nameplate" data-i18n="painting1Label"></div>
          <div class="frame-click-hint">🖼 Tap to view</div>
        </button>

        <!-- Kakemono -->
        <div class="kakemono" aria-hidden="true">
          <div class="kk-roll kk-top"></div>
          <div class="kk-paper">
            <span>先</span><span>生</span><span>へ</span>
          </div>
          <div class="kk-roll kk-bot"></div>
        </div>

        <!-- Painting 2 -->
        <button class="painting" id="painting-2" onclick="openPainting(2)" aria-label="View class photo 2">
          <div class="frame-wood">
            <div class="frame-mat">
              <img src="references/painting_2.jpeg" alt="Class memory 2" class="p-img">
              <div class="p-varnish"></div>
            </div>
          </div>
          <div class="frame-nameplate" data-i18n="painting2Label"></div>
          <div class="frame-click-hint">🖼 Tap to view</div>
        </button>

        <!-- Right shoji -->
        <div class="shoji shoji-r" aria-hidden="true">
          <div class="shoji-inner">
            <div class="sh"></div><div class="sh"></div>
            <div class="sh"></div><div class="sh"></div>
            <div class="sv"></div><div class="sv"></div><div class="sv"></div>
          </div>
          <div class="shoji-glow"></div>
        </div>

        <!-- Final box -->
        <div class="final-mount">
          <button class="final-box" id="final-box" onclick="clickFinalBox()" aria-label="Special box">
            <div class="fb-lid"><div class="fb-lid-deco"></div></div>
            <div class="fb-body">
              <span class="fb-star">✦</span>
              <div class="fb-line"></div>
            </div>
            <div class="fb-lock" id="fb-lock">🔒</div>
            <div class="fb-glow" aria-hidden="true"></div>
          </button>
          <span class="final-label" data-i18n="finalBoxLabel"></span>
        </div>

      </div><!-- .rm-wall -->

      <!-- Floor baseboard -->
      <div class="baseboard" aria-hidden="true"></div>

      <!-- Floor -->
      <div class="rm-floor">

        <!-- Ambient floor glow strip -->
        <div class="floor-glow" aria-hidden="true"></div>

        <!-- ── OBJECTS — 6 memory items ── -->
        <!-- Each object: visual icon + label badge below -->

        <!-- OBJ 2 — Letter (left upper) -->
        <button class="obj" id="obj-2" data-msg="2" onclick="clickObject(2)"
                style="left:5%;top:5%;" aria-label="Letter">
          <div class="obj-icon">
            <div class="letter-body">
              <div class="letter-v"></div>
              <span class="letter-stamp">✉</span>
            </div>
          </div>
          <span class="obj-badge" data-i18n="obj2Label"></span>
          <div class="obj-glow"></div>
        </button>

        <!-- OBJ 3 — Books (left lower) -->
        <button class="obj" id="obj-3" data-msg="3" onclick="clickObject(3)"
                style="left:3%;top:52%;" aria-label="Books">
          <div class="obj-icon">
            <div class="books-row">
              <div class="book" style="--bc:#8b1a1a;height:44px;width:14px;"></div>
              <div class="book" style="--bc:#1a3870;height:38px;width:12px;"></div>
              <div class="book" style="--bc:#5c3317;height:32px;width:10px;"></div>
              <span style="font-size:18px;line-height:1">📜</span>
            </div>
          </div>
          <span class="obj-badge" data-i18n="obj3Label"></span>
          <div class="obj-glow"></div>
        </button>

        <!-- OBJ 5 — Game (right upper) -->
        <button class="obj" id="obj-5" data-msg="5" onclick="clickObject(5)"
                style="right:5%;top:5%;" aria-label="Game board">
          <div class="obj-icon">
            <div class="goban">
              <div class="goban-grid"></div>
              <div class="gp gp-w"></div>
              <div class="gp gp-b"></div>
            </div>
          </div>
          <span class="obj-badge" data-i18n="obj5Label"></span>
          <div class="obj-glow"></div>
        </button>

        <!-- OBJ 6 — Bonsai (right mid) -->
        <button class="obj" id="obj-6" data-msg="6" onclick="clickObject(6)"
                style="right:3%;top:30%;" aria-label="Bonsai plant">
          <div class="obj-icon">
            <div class="bonsai-shelf">
              <span class="bonsai-plant">🌿</span>
              <div class="bonsai-pot"></div>
              <div class="shelf-plank"></div>
            </div>
          </div>
          <span class="obj-badge" data-i18n="obj6Label"></span>
          <div class="obj-glow"></div>
        </button>

        <!-- OBJ 4 — Cushion (right lower) -->
        <button class="obj" id="obj-4" data-msg="4" onclick="clickObject(4)"
                style="right:6%;top:58%;" aria-label="Zabuton cushion">
          <div class="obj-icon">
            <div class="zabuton">
              <div class="zabuton-inner"></div>
              <div class="zabuton-dot"></div>
            </div>
          </div>
          <span class="obj-badge" data-i18n="obj4Label"></span>
          <div class="obj-glow"></div>
        </button>

        <!-- Center table + OBJ 1 -->
        <div class="table-area">
          <div class="jp-table">
            <div class="table-top">
              <button class="obj obj-on-table" id="obj-1" data-msg="1" onclick="clickObject(1)"
                      aria-label="Wooden box">
                <div class="obj-icon">
                  <div class="wbox">
                    <div class="wbox-lid"></div>
                    <div class="wbox-body"></div>
                    <div class="wbox-lock"></div>
                  </div>
                </div>
                <span class="obj-badge" data-i18n="obj1Label"></span>
                <div class="obj-glow"></div>
              </button>
              <span class="table-tea" aria-hidden="true">🍵</span>
            </div>
            <div class="table-legs" aria-hidden="true"></div>
          </div>
        </div>

        <!-- Floor cushion deco -->
        <div class="floor-cushion-deco" aria-hidden="true"></div>

      </div><!-- .rm-floor -->

      <!-- Sensei character (positioned absolutely over entire room) -->
      <div id="sensei-char" class="sensei-char">
        <div id="sensei-bubble" class="s-bubble hidden">
          <p id="bubble-text"></p>
          <div class="bubble-tip"></div>
        </div>
        <img id="sensei-img" src="sensei.png" alt="Sensei" class="sensei-img"
             onerror="this.style.display='none';document.getElementById('sensei-fb').style.display='block'">
        <div id="sensei-fb" class="sensei-fb" style="display:none">👨‍🏫</div>
        <div class="sensei-shadow" aria-hidden="true"></div>
      </div>

    </div><!-- .room -->

    <div id="free-bar" class="free-bar hidden">
      <button class="replay-btn" onclick="replayTour()" data-i18n="replayBtn"></button>
    </div>
  </section>


  <!-- ════════════════════════════
       MESSAGE MODAL
  ════════════════════════════ -->
  <div id="msg-modal" class="modal-bg hidden" onclick="closeOnBg(event,'msg-modal')"
       role="dialog" aria-modal="true">
    <div class="msg-card" onclick="event.stopPropagation()">
      <button class="x-btn" onclick="closeModal('msg-modal')">✕</button>
      <div class="msg-stamp" id="msg-stamp"></div>
      <h2 class="msg-title" id="msg-title"></h2>
      <div class="card-line"></div>
      <p class="msg-body" id="msg-body"></p>
      <div class="card-deco">✦ &ensp; 先生 &ensp; ✦</div>
    </div>
  </div>

  <!-- ════════════════════════════
       FINAL MODAL
  ════════════════════════════ -->
  <div id="final-modal" class="modal-bg final-bg hidden" onclick="closeOnBg(event,'final-modal')"
       role="dialog" aria-modal="true">
    <div class="final-card" onclick="event.stopPropagation()">
      <button class="x-btn x-btn-gold" onclick="closeModal('final-modal')">✕</button>
      <div id="confetti-zone" class="confetti-zone" aria-hidden="true"></div>
      <div class="final-header">
        <span>⛩️</span>
        <h2 class="final-title" id="final-title"></h2>
        <span>🌸</span>
      </div>
      <div class="card-line gold-line"></div>
      <div class="final-body" id="final-body"></div>
      <div class="final-from" data-i18n="signatureFrom" id="final-from"></div>
      <div class="card-deco gold-deco">✦ &ensp; 先生ありがとうございます &ensp; ✦</div>
    </div>
  </div>

  <!-- ════════════════════════════
       PAINTING OVERLAY
  ════════════════════════════ -->
  <div id="painting-overlay" class="painting-ov hidden" role="dialog" aria-modal="true">
    <button class="ov-close" onclick="closePainting()">✕</button>
    <div class="ba-container" id="ba-wrap">
      <div class="ba-side ba-art" id="ba-left">
        <img id="ba-img-art" src="" alt="Art version" class="ba-img">
        <div class="ba-art-label" data-i18n="sliderLeft"></div>
      </div>
      <div class="ba-side ba-orig" id="ba-right">
        <img id="ba-img-orig" src="" alt="Original" class="ba-img">
        <div class="ba-orig-label" data-i18n="sliderRight"></div>
      </div>
      <div class="ba-divider" id="ba-divider" style="left:50%">
        <div class="ba-handle" id="ba-handle">◀▶</div>
      </div>
    </div>
    <p class="ba-hint">← Drag to compare →</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
